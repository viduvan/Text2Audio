# Text2Audio Configuration

paths:
  stories_dir: "./stories"
  output_dir: "./output"
  models_dir: "./models"

text_processor:
  min_scene_chars: 100
  max_scene_chars: 1000

tts:
  engine: "edge-tts"
  voice: "vi-VN-HoaiMyNeural"
  rate: "+0%"
  pitch: "+0Hz"
  volume: "+0%"
  output_format: "mp3"

image:
  model_id: "./models/animagine-xl-3.1"
  width: 1280
  height: 720
  num_inference_steps: 25
  guidance_scale: 7.0
  style_prefix: "anime style, detailed anime illustration, vibrant colors, masterpiece, best quality"
  negative_prompt: "lowres, bad anatomy, bad hands, text, error, cropped, worst quality, low quality, blurry, ugly, deformed"
  seed: -1
  enable_cpu_offload: true

video:
  default_mode: "ken_burns"
  ken_burns:
    effect: "random"
    zoom_ratio: 1.2
    fps: 24
  wan21:
    model_id: "./models/Wan2.1-T2V-1.3B-Diffusers"
    width: 832
    height: 480
    num_frames: 81
    num_inference_steps: 30
    guidance_scale: 6.0
    fps: 16
    enable_cpu_offload: true
    enable_vae_tiling: true

merger:
  output_resolution:
    width: 1280
    height: 720
  fps: 24
  video_codec: "libx264"
  audio_codec: "aac"
  transition_duration: 0.5
  transition_type: "crossfade"

subtitle:
  enabled: true
  font_size: 36
  font_color: "white"
  stroke_color: "black"
  stroke_width: 2
  position: "bottom"

ui:
  host: "0.0.0.0"
  port: 7860
  share: false
