# Text2Audio Configuration

paths:
  stories_dir: "./stories"
  output_dir: "./output"
  models_dir: "./models"

text_processor:
  min_scene_chars: 100
  max_scene_chars: 1000

tts:
  engine: "vieneu"  # "vieneu" (local, 7+ voices) hoặc "edge-tts" (cloud, 2 voices)
  # Edge-TTS settings
  voice: "vi-VN-HoaiMyNeural"
  rate: "+0%"
  pitch: "+0Hz"
  volume: "+0%"
  output_format: "mp3"
  # VieNeu-TTS settings
  vieneu:
    mode: "standard"           # "standard" (chất lượng cao) hoặc "turbo" (nhanh hơn)
    emotion: "storytelling"    # "storytelling" (kể chuyện) hoặc "natural" (tự nhiên)
    voice_id: "Ly"             # Preset: Ly, Tuyen, Binh, Vinh, Doan, Sơn, Ngoc
    ref_audio: null            # Đường dẫn file audio mẫu (cho clone giọng)
    ref_text: null             # Text tham chiếu (cho clone standard mode)

image:
  model_id: "./models/animagine-xl-3.1"
  width: 1280
  height: 720
  num_inference_steps: 25
  guidance_scale: 7.0
  style_prefix: "anime style, detailed anime illustration, vibrant colors, masterpiece, best quality"
  negative_prompt: "lowres, bad anatomy, bad hands, text, error, cropped, worst quality, low quality, blurry, ugly, deformed"
  seed: -1
  enable_cpu_offload: true

video:
  ken_burns:
    effect: "random"
    zoom_ratio: 1.2
    fps: 24

merger:
  output_resolution:
    width: 1280
    height: 720
  fps: 24
  video_codec: "libx264"
  audio_codec: "aac"
  transition_duration: 0.5
  transition_type: "crossfade"

subtitle:
  enabled: true
  font_size: 36
  font_color: "white"
  stroke_color: "black"
  stroke_width: 2
  position: "bottom"

ui:
  host: "0.0.0.0"
  port: 7860
  share: false
