# Text2Audio Configuration

paths:
  stories_dir: "./stories"
  output_dir: "./output"
  models_dir: "./models"

# ── Text Rewriter (N1) ──
rewriter:
  enabled: true
  provider: "gemini"               # "gemini" hoặc "ollama"
  gemini:
    model: "gemini-2.0-flash"      # API key: export GEMINI_API_KEY="your_key"
  ollama:
    model: "qwen2.5:7b"
    base_url: "http://localhost:11434"
  style: "narrator"                # narrator / summary / creative
  batch_size: 5                    # Số chunks gửi 1 batch

# ── Watermark chống ăn cắp audio ──
watermark:
  enabled: true
  channel_name: "Kênh Truyện Audio"
  interval_scenes: 25              # Chèn watermark mỗi N scenes (~15 phút)
  templates:
    intro: "Bạn đang nghe {channel_name}, kênh audio truyện chất lượng cao. Nếu thích, hãy đăng ký kênh nhé."
    middle: "Nội dung thuộc bản quyền kênh {channel_name}."
    part_end: "{channel_name}. Cảm ơn bạn đã theo dõi, phần tiếp theo sẽ bắt đầu ngay."
    outro: "Cảm ơn bạn đã nghe hết truyện trên kênh {channel_name}. Đăng ký kênh để không bỏ lỡ truyện hay tiếp theo nhé!"

# ── Text Processor (N2) ──
text_processor:
  min_scene_chars: 100
  max_scene_chars: 1000

# ── TTS (N3) ──
tts:
  engine: "vieneu"                 # "vieneu" (HuggingFace Hub) hoặc "edge-tts" (cloud)
  # Edge-TTS settings
  voice: "vi-VN-HoaiMyNeural"
  rate: "+0%"
  pitch: "+0Hz"
  volume: "+0%"
  output_format: "wav"
  # VieNeu-TTS v3 Turbo settings
  vieneu:
    model_id: "pnnbao-ump/VieNeu-TTS-v3-Turbo"
    mode: "standard"           # v3-Turbo dùng safetensors → mode=standard
    emotion: "natural"
    voice_id: "Ngọc Linh"
    ref_audio: null
    ref_text: null

# ── Image Generation (N4) ──
image:
  model_id: "./models/animagine-xl-3.1"
  use_lcm: true                    # Bật LCM LoRA adapter (6-8 steps thay vì 25)
  lcm_lora_id: "latent-consistency/lcm-lora-sdxl"
  width: 1280
  height: 720
  num_inference_steps: 8           # LCM: 6-8 steps (default SDXL: 25)
  guidance_scale: 2.0              # LCM: 1.5-2.0 (default SDXL: 7.0)
  style_prefix: "anime style, detailed anime illustration, vibrant colors, masterpiece, best quality"
  negative_prompt: "lowres, bad anatomy, bad hands, text, error, cropped, worst quality, low quality, blurry, ugly, deformed"
  seed: -1
  enable_cpu_offload: true

# ── Ken Burns Video (N5) ──
video:
  ken_burns:
    effect: "random"
    zoom_ratio: 1.2
    fps: 24
  use_ffmpeg: true                 # Dùng FFmpeg thay MoviePy cho tốc độ

# ── Video Merger (N7) ──
merger:
  output_resolution:
    width: 1280
    height: 720
  fps: 24
  video_codec: "libx264"
  audio_codec: "aac"
  transition_duration: 0.5
  transition_type: "crossfade"
  parts_per_video: 10              # Chia thành N parts (checkpoints)

# ── Subtitle (N6) ──
subtitle:
  enabled: true
  font_size: 36
  font_color: "white"
  stroke_color: "black"
  stroke_width: 2
  position: "bottom"

# ── Post-process (N8) ──
post_process:
  burn_subtitles: true
  add_intro: false
  add_outro: false

# ── UI ──
ui:
  host: "0.0.0.0"
  port: 7860
  share: false
